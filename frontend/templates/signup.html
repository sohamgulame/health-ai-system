<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Health Guard - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-color);
        }
        .login-card {
            background-color: var(--card-bg);
            padding: 48px;
            border-radius: var(--radius);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 440px;
            text-align: center;
        }
        .login-card h2 {
            margin-bottom: 32px;
            font-size: 28px;
            color: var(--text-main);
            font-weight: 700;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }
        .login-btn {
            width: 100%;
            margin-top: 16px;
            padding: 14px;
            font-size: 16px;
            border-radius: 10px;
        }
        .brand-logo {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand-logo">
                <span style="color: var(--accent-blue); font-size: 32px;">♡</span>
                <span>HealthGuard</span>
            </div>
            <h2>Create Account</h2>
            <div id="error-message" style="color: var(--accent-red); margin-bottom: 16px; display: none; font-size: 14px;"></div>
            <div id="success-message" style="color: #10b981; margin-bottom: 16px; display: none; font-size: 14px;"></div>
            <form id="signup-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>
                <button type="submit" class="btn-primary login-btn">Sign Up</button>
            </form>
            <p style="margin-top: 24px; font-size: 14px; color: var(--text-muted);">
                Already have an account? <a href="/login" style="color: var(--accent-blue); font-weight: 600; text-decoration: none;">Sign In</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-message');
            const successEl = document.getElementById('success-message');

            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    successEl.innerText = 'Account created! Redirecting to login...';
                    successEl.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    errorEl.innerText = data.error || 'Signup failed';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                errorEl.innerText = 'An error occurred. Please try again.';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
